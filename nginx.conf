# ============================================================
#  nginx.conf — Hugging Face Spaces
#  Single port: 7860 (HF requirement)
#  Routes to Flask 5000 and Flask 5001 internally
# ============================================================

worker_processes 1;
error_log stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Use /tmp for temp files (HF non-root friendly)
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path       /tmp/nginx_proxy;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream gesture_app {
        server 127.0.0.1:5000;
    }

    upstream avatar_app {
        server 127.0.0.1:5001;
    }

    server {
        listen 7860;
        server_name _;
        client_max_body_size 5M;

        # ── Health check ──────────────────────────────────────
        location /health {
            proxy_pass http://gesture_app/health;
            proxy_set_header Host $host;
        }

        # ── Socket.IO — gesture app ───────────────────────────
        location /socket.io/ {
            proxy_pass http://gesture_app/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_buffering off;
            proxy_cache off;
        }

        # ── MJPEG video stream ────────────────────────────────
        location /video_feed {
            proxy_pass http://gesture_app/video_feed;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600;
            chunked_transfer_encoding on;
        }

        # ── Avatar Socket.IO ──────────────────────────────────
        location /avatar/socket.io/ {
            proxy_pass http://avatar_app/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }

        # ── Avatar app ────────────────────────────────────────
        location /avatar/ {
            rewrite ^/avatar/(.*) /$1 break;
            proxy_pass http://avatar_app/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Gesture app (root) ────────────────────────────────
        location / {
            proxy_pass http://gesture_app/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
